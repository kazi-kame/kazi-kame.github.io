<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>kami-kazi | terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Departure+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --bg2: #12151c;
      --surface: #181c25;
      --border: #232836;
      --text: #cdd6f4;
      --dim: #6c7086;
      --accent: #e07b39;
      --accent2: #f0a868;
      --green: #a6e3a1;
      --red: #f38ba8;
      --blue: #89b4fa;
      --yellow: #f9e2af;
      --purple: #cba6f7;
      --prompt: #e07b39;
      --cursor: #e07b39;
    }

    /* DARK MATTER THEME */
    [data-theme="dark-matter"] {
      --bg: #0d0f14;
      --bg2: #12151c;
      --surface: #181c25;
      --border: #232836;
      --text: #cdd6f4;
      --dim: #6c7086;
      --accent: #e07b39;
      --accent2: #f0a868;
      --prompt: #e07b39;
      --cursor: #e07b39;
    }

    /* PLASMA THEME */
    [data-theme="plasma"] {
      --bg: #0a0a12;
      --bg2: #0f0f1a;
      --surface: #14142a;
      --border: #1e1e3a;
      --text: #e0e0ff;
      --dim: #5a5a8a;
      --accent: #7c6af7;
      --accent2: #a99eff;
      --prompt: #7c6af7;
      --cursor: #a99eff;
    }

    /* CHALKBOARD THEME */
    [data-theme="chalkboard"] {
      --bg: #1a2b1a;
      --bg2: #1f301f;
      --surface: #243824;
      --border: #2d452d;
      --text: #d4e8c2;
      --dim: #5a7a4a;
      --accent: #7ec850;
      --accent2: #a8e878;
      --prompt: #7ec850;
      --cursor: #7ec850;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 80px;
    }

    /* SCANLINE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* TERMINAL WINDOW */
    .terminal {
      width: 100%;
      max-width: 860px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(224,123,57,0.04);
    }

    /* TITLEBAR */
    .titlebar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
    }

    .dots { display: flex; gap: 7px; }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .dot.red    { background: #f38ba8; }
    .dot.yellow { background: #f9e2af; }
    .dot.green  { background: #a6e3a1; }

    .titlebar-text {
      flex: 1;
      text-align: center;
      color: var(--dim);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .theme-switcher {
      display: flex;
      gap: 6px;
    }

    .theme-btn {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .theme-btn:hover { transform: scale(1.3); border-color: var(--text); }
    .theme-btn.t-dark    { background: #e07b39; }
    .theme-btn.t-plasma  { background: #7c6af7; }
    .theme-btn.t-chalk   { background: #7ec850; }

    /* OUTPUT AREA */
    .output {
      padding: 24px 28px;
      min-height: 420px;
      max-height: 70vh;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .output::-webkit-scrollbar { width: 4px; }
    .output::-webkit-scrollbar-track { background: transparent; }
    .output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* BOOT SEQUENCE */
    .boot-line {
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .ascii-art {
      color: var(--accent);
      font-size: 11px;
      line-height: 1.2;
      white-space: pre;
      margin-bottom: 8px;
    }

    .welcome-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .pronouns {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .welcome-sub {
      color: var(--dim);
      font-size: 12px;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    /* COMMAND HISTORY */
    .cmd-block { margin-bottom: 20px; }

    .cmd-input-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .prompt-user { color: var(--accent); font-weight: 500; }
    .prompt-at   { color: var(--dim); }
    .prompt-host { color: var(--accent2); font-weight: 500; }
    .prompt-path { color: var(--blue); }
    .prompt-sym  { color: var(--dim); margin-right: 4px; }
    .cmd-text    { color: var(--text); }

    .cmd-output { padding-left: 0; }

    /* HELP GRID */
    .help-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .cmd-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }
    .cmd-btn:hover {
      background: var(--border);
      border-color: var(--accent);
      color: var(--accent2);
      transform: translateY(-1px);
    }
    .cmd-btn:active { transform: translateY(0); }

    /* PROJECT CARD */
    .project-card {
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      background: var(--surface);
      border-radius: 4px;
      padding: 14px 18px;
      margin: 6px 0;
      transition: border-color 0.15s;
    }
    .project-card:hover { border-left-color: var(--accent2); }

    .project-title {
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .project-desc { color: var(--text); font-size: 12px; margin-bottom: 8px; }
    .project-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag {
      font-size: 10px;
      background: var(--border);
      color: var(--dim);
      padding: 2px 8px;
      border-radius: 2px;
    }
    .project-link {
      color: var(--blue);
      font-size: 11px;
      text-decoration: none;
    }
    .project-link:hover { color: var(--accent2); text-decoration: underline; }

    /* POEM CARD */
    .poem-card {
      border-left: 3px solid var(--purple);
      padding: 12px 18px;
      margin: 6px 0;
      background: var(--surface);
      border-radius: 4px;
    }
    .poem-title { color: var(--purple); font-weight: 500; font-size: 13px; margin-bottom: 2px; }
    .poem-meta  { color: var(--dim); font-size: 11px; }

    /* POEM LANGUAGE SELECTOR */
    .lang-prompt { color: var(--dim); font-size: 12px; margin-bottom: 10px; }
    .lang-btns { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--purple);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 7px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .lang-btn:hover {
      background: var(--border);
      border-color: var(--purple);
      transform: translateY(-1px);
    }
    .lang-btn:active { transform: translateY(0); }

    /* POEM DISPLAY */
    .poem-viewer {
      margin-top: 14px;
      border-left: 3px solid var(--purple);
      padding-left: 16px;
      animation: fadeIn 0.3s forwards;
    }
    .poem-lang-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 10px;
      opacity: 0.7;
    }
    .poem-text-en {
      color: var(--text);
      font-style: italic;
      line-height: 2;
      white-space: pre-wrap;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }
    .poem-text-ur {
      color: var(--text);
      line-height: 2.6;
      white-space: pre-wrap;
      font-size: 17px;
      direction: rtl;
      text-align: right;
      font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', 'Urdu Typesetting', Georgia, serif;
    }
    .poem-text-hi {
      color: var(--text);
      line-height: 2.2;
      white-space: pre-wrap;
      font-size: 15px;
      font-family: 'Noto Sans Devanagari', 'Mangal', Georgia, serif;
    }

    /* CONTACT */
    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-label { color: var(--dim); width: 90px; flex-shrink: 0; }
    .contact-val   { color: var(--blue); }
    .contact-val a { color: var(--blue); text-decoration: none; }
    .contact-val a:hover { color: var(--accent2); text-decoration: underline; }

    /* SIMULATE */
    .sim-canvas {
      font-size: 11px;
      color: var(--accent);
      line-height: 1.1;
      white-space: pre;
      background: var(--surface);
      padding: 12px 16px;
      border-radius: 4px;
      border: 1px solid var(--border);
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ERROR / SUCCESS */
    .err  { color: var(--red); }
    .ok   { color: var(--green); }
    .info { color: var(--yellow); }
    .muted { color: var(--dim); font-size: 12px; }

    /* INPUT BAR */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-prompt {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      font-size: 13px;
    }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      caret-color: var(--cursor);
    }

    #cmd-input::placeholder { color: var(--dim); }

    /* CURSOR BLINK */
    .cursor {
      display: inline-block;
      width: 8px; height: 15px;
      background: var(--cursor);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* WHOAMI */
    .whoami-block {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 4px;
      padding: 16px 20px;
      margin-top: 4px;
    }
    .whoami-key   { color: var(--accent); font-weight: 500; }
    .whoami-val   { color: var(--text); }
    .whoami-row   { display: flex; gap: 12px; margin-bottom: 4px; font-size: 13px; }

    /* SUDO */
    .sudo-msg {
      color: var(--red);
      font-size: 13px;
      padding: 4px 0;
    }

    /* HISTORY LIST */
    .history-item {
      color: var(--dim);
      font-size: 12px;
      padding: 2px 0;
    }
    .history-num { color: var(--accent); margin-right: 12px; }

    /* SECTION LABEL */
    .section-label {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
      margin-top: 4px;
    }

    /* SIMULATE PANEL */
    #sim-container { position: relative; }
    #sim-stop {
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    #sim-stop:hover { background: rgba(243,139,168,0.1); }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      body { padding: 12px 8px 60px; font-size: 12px; }
      .output { padding: 16px 14px; }
      .input-area { padding: 10px 14px; }
      .ascii-art { font-size: 9px; }
      .welcome-name { font-size: 16px; }
    }
  </style>
</head>

    "error: elevated privileges require understanding randomness first.\nhave you tried `kz projects`?",
    "you cannot sudo chaos.\nchaos sudos you.",

// ─── STATE ────────────────────────────────────────────────────────────────────

let cmdHistory   = [];
let historyIndex = -1;
let simInterval  = null;

// ─── THEME ───────────────────────────────────────────────────────────────────

function setTheme(name) {
  document.body.setAttribute('data-theme', name);
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────────────

const output   = document.getElementById('output');
const cmdInput = document.getElementById('cmd-input');

function scrollBottom() {
  output.scrollTop = output.scrollHeight;
}

function appendHTML(html, delayMs = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      output.insertAdjacentHTML('beforeend', html);
      scrollBottom();
      resolve();
    }, delayMs);
  });
}

function promptHTML(cmd) {
  return `
    <div class="cmd-input-line">
      <span class="prompt-user">kami-kazi</span><span class="prompt-at">@</span><span class="prompt-host">chaos</span><span class="prompt-path">:~</span><span class="prompt-sym">$</span>&nbsp;<span class="cmd-text">${escapeHtml(cmd)}</span>
    </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── BOOT SEQUENCE ───────────────────────────────────────────────────────────

async function boot() {

    { html: `<div class="boot-line" style="animation-delay:0.1s"><span class="muted">initializing kernel... <span class="ok">ok</span></span></div>`, delay: 100 },

    { html: `
      <div class="boot-line" style="animation-delay:0.9s">
        <div class="ascii-art">

 ╚═╝  ╚═╝╚═╝  ╚═╝╚═╝     ╚═╝╚═╝      ╚═╝  ╚═╝╚═╝  ╚═╝   ╚═╝  ╚═╝</div>
        <div class="welcome-name">Kami-Kazi</div>
        <div class="pronouns">ILove/MyGirlfriend</div>
        <div class="welcome-sub">Physics student. I like studying randomness.</div>
      </div>`, delay: 900 },
    { html: `<div class="boot-line" style="animation-delay:1.1s"><br><hr class="divider"></div>`, delay: 1100 },
    { html: `<div class="boot-line" style="animation-delay:1.3s"><span class="muted">Type a command or click one below. Try <span style="color:var(--accent)">help</span> to start.</span><br><br></div>`, delay: 1300 },
  ];

  for (const line of lines) {
    await appendHTML(line.html, line.delay);
  }

  // Auto-show help buttons after boot
  await appendHTML(renderHelp(), 1500);
}

// ─── COMMAND RENDERER ────────────────────────────────────────────────────────

    'whoami', 'kz projects', 'kz poems', 'contact', 'simulate', 'history', 'clear', 'help'

  const btns = cmds.map(c =>
    `<button class="cmd-btn" onclick="runCmd('${c}')">${c}</button>`
  ).join('');
  return `
    <div class="cmd-block">
      <div class="section-label">available commands</div>
      <div class="help-grid">${btns}</div>
      <br>
      <span class="muted">hint: try <span style="color:var(--accent)">sudo</span> if you're feeling lucky</span>
    </div>`;
}

function renderWhoami() {

  const items = DATA.poems.map(p => `

function renderPoem(id) {
  const p = DATA.poems.find(x => x.id === id);
  if (!p) return `<span class="err">cat: ${escapeHtml(id)}: no such poem. run <span style="color:var(--accent)">kz poems</span> to list all.</span>`;
  const uid = 'poem-viewer-' + id + '-' + Date.now();
  return `
    <div>
      <div style="color:var(--purple);font-size:14px;font-weight:500;margin-bottom:2px">${escapeHtml(p.title)}</div>
      <div class="muted" style="margin-bottom:12px">${escapeHtml(p.date)}</div>
      <div class="lang-prompt">select language to read:</div>
      <div class="lang-btns" id="${uid}-btns">
        <button class="lang-btn" onclick="showPoemLang('${uid}', '${id}', 'urdu')">اردو</button>
        <button class="lang-btn" onclick="showPoemLang('${uid}', '${id}', 'english')">English</button>
        <button class="lang-btn" onclick="showPoemLang('${uid}', '${id}', 'hindi')">हिन्दी</button>
      </div>
      <div id="${uid}"></div>
    </div>`;
}

function showPoemLang(uid, poemId, lang) {
  const p = DATA.poems.find(x => x.id === poemId);
  if (!p) return;
  const text = p.text[lang] || '';
  const labels = { urdu: 'اردو', english: 'English', hindi: 'हिन्दी' };
  const cssClass = lang === 'urdu' ? 'poem-text-ur' : lang === 'hindi' ? 'poem-text-hi' : 'poem-text-en';
  const container = document.getElementById(uid);
  if (!container) return;
  container.innerHTML = `
    <div class="poem-viewer">
      <div class="poem-lang-label">${labels[lang]}</div>
      <div class="${cssClass}">${escapeHtml(text)}</div>
    </div>`;
  // Highlight active button
  const btnsEl = document.getElementById(uid + '-btns');
  if (btnsEl) {
    btnsEl.querySelectorAll('.lang-btn').forEach(b => {
      b.style.borderColor = '';
      b.style.background = '';
    });
    btnsEl.querySelectorAll('.lang-btn').forEach(b => {
      if (b.textContent.trim() === labels[lang]) {
        b.style.borderColor = 'var(--purple)';
        b.style.background = 'rgba(203,166,247,0.08)';
      }
    });
  }
  container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ─── SIMULATE (ASCII double pendulum) ────────────────────────────────────────

function startSimulate() {
  if (simInterval) clearInterval(simInterval);

  const W = 42, H = 18;
  let t = 0;
  const id = 'sim-canvas-' + Date.now();

  const html = `
    <div id="sim-container">
      <div class="muted" style="margin-bottom:6px">simulating double pendulum — lyapunov be wildin'</div>
      <pre class="sim-canvas" id="${id}"></pre>
      <button id="sim-stop" onclick="stopSimulate()">■ stop simulation</button>
    </div>`;

  const el = document.createElement('div');
  el.innerHTML = html;
  output.appendChild(el);
  scrollBottom();

  const canvas = document.getElementById(id);

  simInterval = setInterval(() => {
    t += 0.06;

    // Simplified double pendulum kinematics (visual only)
    const a1 = Math.PI / 2.2 + Math.sin(t * 0.7) * 1.2 + Math.sin(t * 1.3) * 0.4;
    const a2 = Math.PI / 1.8 + Math.sin(t * 1.1 + 1) * 1.5 + Math.sin(t * 0.5) * 0.8;

    const L1 = 7, L2 = 6;
    const ox = Math.floor(W / 2), oy = 3;

    const x1 = ox + Math.round(L1 * Math.sin(a1));
    const y1 = oy + Math.round(L1 * Math.cos(a1));
    const x2 = x1 + Math.round(L2 * Math.sin(a2));
    const y2 = y1 + Math.round(L2 * Math.cos(a2));

    // Build grid
    const grid = Array.from({length: H}, () => Array(W).fill(' '));

    function setCell(x, y, ch) {
      if (y >= 0 && y < H && x >= 0 && x < W) grid[y][x] = ch;
    }

    // Draw rods (bresenham)
    function drawLine(x0,y0,x1,y1,ch) {
      let dx = Math.abs(x1-x0), dy = Math.abs(y1-y0);
      let sx = x0<x1?1:-1, sy = y0<y1?1:-1, err = dx-dy;
      while(true) {
        setCell(x0,y0,ch);
        if(x0===x1&&y0===y1) break;
        let e2 = 2*err;
        if(e2>-dy){err-=dy;x0+=sx;}
        if(e2<dx){err+=dx;y0+=sy;}
      }
    }

    drawLine(ox,oy,x1,y1,'·');
    drawLine(x1,y1,x2,y2,'·');
    setCell(ox,oy,'⊙');
    setCell(x1,y1,'●');
    setCell(x2,y2,'◉');

    // Phase info
    const lyap = (Math.abs(Math.sin(t * 2.3)) * 0.8 + 0.1).toFixed(3);
    const rows = grid.map(r => r.join(''));
    canvas.textContent = rows.join('\n') + `\n\nλ (lyapunov) ≈ ${lyap}   t = ${t.toFixed(2)}s`;
  }, 80);
}

function stopSimulate() {
  if (simInterval) { clearInterval(simInterval); simInterval = null; }
  const sc = document.getElementById('sim-container');
  if (sc) sc.insertAdjacentHTML('beforeend', '<div class="muted" style="margin-top:6px">simulation terminated.</div>');
  document.getElementById('sim-stop')?.remove();
}

// ─── COMMAND PROCESSOR ───────────────────────────────────────────────────────

async function runCmd(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  cmdHistory.push(raw.trim());
  historyIndex = cmdHistory.length;

  // Echo prompt
  await appendHTML(`<div class="cmd-block">${promptHTML(raw.trim())}<div class="cmd-output">`);

  let responseHTML = '';

  if (cmd === 'help') {
    responseHTML = renderHelp();
  } else if (cmd === 'whoami') {
    responseHTML = renderWhoami();
  } else if (cmd === 'kz projects') {
    responseHTML = renderProjectList();
  } else if (cmd === 'kz poems') {
    responseHTML = renderPoemList();
  } else if (cmd === 'contact') {
    responseHTML = renderContact();
  } else if (cmd === 'history') {
    responseHTML = renderHistory();
  } else if (cmd === 'clear') {
    output.innerHTML = '';
    await appendHTML(renderHelp());
    return;
  } else if (cmd === 'simulate') {
    await appendHTML('</div></div>');
    startSimulate();
    cmdInput.value = '';
    return;
  } else if (cmd.startsWith('sudo')) {
    responseHTML = renderSudo(cmd.slice(4).trim());
  } else if (cmd.startsWith('cat ')) {
    const id = cmd.slice(4).trim();
    const isProject = DATA.projects.find(p => p.id === id);
    const isPoem    = DATA.poems.find(p => p.id === id);
    if (isProject) responseHTML = renderProject(id);
    else if (isPoem) responseHTML = renderPoem(id);
    else responseHTML = `<span class="err">cat: ${escapeHtml(id)}: no such file. try <span style="color:var(--accent)">kz projects</span> or <span style="color:var(--accent)">kz poems</span>.</span>`;
  } else {
    responseHTML = `<span class="err">command not found: ${escapeHtml(cmd)}</span><br><span class="muted">type <span style="color:var(--accent)">help</span> to see available commands.</span>`;
  }

  await appendHTML(responseHTML + '</div></div>');
  cmdInput.value = '';
  scrollBottom();
}

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────

cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    runCmd(cmdInput.value);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      cmdInput.value = cmdHistory[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < cmdHistory.length - 1) {
      historyIndex++;
      cmdInput.value = cmdHistory[historyIndex];
    } else {
      historyIndex = cmdHistory.length;
      cmdInput.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    // Basic autocomplete
    const val = cmdInput.value.toLowerCase();
    const all = ['whoami','kz projects','kz poems','contact','simulate','history','clear','help','sudo'];
    const match = all.find(c => c.startsWith(val));
    if (match) cmdInput.value = match;
  }
});

// Click anywhere on terminal focuses input
document.querySelector('.terminal').addEventListener('click', () => cmdInput.focus());

// ─── INIT ─────────────────────────────────────────────────────────────────────
boot();
cmdInput.focus();
</script>
